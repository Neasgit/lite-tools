<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 fill=%27%230d0d0d%27/%3E%3Ctext x=%2716%27 y=%2724%27 font-family=%27Helvetica Neue,Arial,sans-serif%27 font-size=%2720%27 font-weight=%27900%27 text-anchor=%27middle%27 fill=%27%23D4A800%27%3EL%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="only dark">
  <title>Production Pipeline — Left in the Edit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1e1e1e;
      --border: #1e1e1e;
      --text: #e0e0e0;
      --dim: #484848;
      --mid: #888;
      --yellow: #FFDD00;
      --green: #1f5235;
      --green-light: #48c97a;
      --font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    /* Tags */
    .tag {
      display: inline-block; padding: 2px 9px; border-radius: 2px;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
    }
    .tag-done    { background: rgba(31,82,53,.5); color: var(--green-light); border: 1px solid rgba(72,201,122,.2); }
    .tag-active  { background: rgba(255,221,0,.1); color: var(--yellow); border: 1px solid rgba(255,221,0,.25); }
    .tag-pending { background: transparent; color: var(--dim); border: 1px solid var(--border); }

    /* Buttons */
    .btn {
      border: 1px solid var(--border); background: var(--surface2); color: var(--mid);
      padding: 9px 18px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      font-family: var(--font); font-weight: 600; cursor: pointer; border-radius: 2px; transition: all .15s;
    }
    .btn:hover { border-color: #444; color: var(--text); }
    .btn-primary { background: var(--yellow); color: #000; border-color: transparent; font-weight: 700; }
    .btn-primary:hover { filter: brightness(1.1); }

    /* ── DASHBOARD ── */
    #view-dash { max-width: 1100px; margin: 0 auto; padding: 0 28px 52px; }

    .page-header {
      margin-top: 36px;
      border-bottom: 1px solid var(--border);
      padding: 48px 80px 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 36px;
    }
    .page-header-left { display: flex; flex-direction: column; gap: 8px; }
    .page-eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--dim); font-weight: 500; }
    .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; color: #fff; }
    .page-title span { color: var(--yellow); }
    .page-sub { font-size: 13px; color: var(--mid); margin-top: 2px; }

    .launch-block { text-align: right; }
    .launch-n { font-size: 42px; font-weight: 700; line-height: 1; }
    .launch-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-top: 4px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 14px; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 24px; cursor: pointer; transition: border-color .15s, transform .1s; position: relative;
    }
    .card:hover { border-color: #3c3c3c; transform: translateY(-1px); }
    .card-num  { font-size: 9px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; font-weight: 600; }
    .card-name { font-size: 20px; font-weight: 700; margin: 5px 0 16px; letter-spacing: -.3px; }
    .card-row  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
    .card-pct  { font-size: 11px; color: var(--mid); font-weight: 500; }
    .pbar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .pfill { height: 100%; background: var(--yellow); border-radius: 2px; transition: width .35s; }
    .card-next { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .card-next-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
    .card-next-txt { font-size: 12px; color: var(--mid); line-height: 1.5; }

    .add-card {
      background: transparent; border: 1px dashed #252525; border-radius: 4px;
      padding: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; color: var(--dim); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      font-family: var(--font); font-weight: 600; transition: all .15s; min-height: 130px;
    }
    .add-card:hover { border-color: #404040; color: var(--mid); }

    /* ── DETAIL ── */
    #view-detail { max-width: 700px; margin: 0 auto; padding: 52px 28px; }

    .back {
      background: none; border: none; color: var(--dim); font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; font-family: var(--font); cursor: pointer; padding: 0;
      margin-bottom: 32px; display: block; transition: color .15s;
    }
    .back:hover { color: var(--text); }

    .det-hdr { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .det-num  { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); }
    .det-name { font-size: 32px; font-weight: 700; letter-spacing: -.5px; margin: 6px 0 16px; }
    .det-prog-row { display: flex; align-items: center; gap: 14px; }
    .det-pbar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .det-pfill { height: 100%; background: var(--yellow); transition: width .35s; }
    .det-pct { font-size: 12px; color: var(--mid); white-space: nowrap; font-weight: 500; }

    .stages { display: flex; flex-direction: column; gap: 3px; }

    .stage { border-radius: 3px; overflow: hidden; }
    .stage-hdr { display: flex; align-items: center; gap: 11px; padding: 13px 16px; }
    .stage.has-tasks .stage-hdr { cursor: pointer; }
    .stage.has-tasks .stage-hdr:hover { background: var(--surface); }

    .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sdot-done    { background: var(--green-light); }
    .sdot-active  { background: var(--yellow); }
    .sdot-pending { background: var(--border); }

    .sname { flex: 1; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .stage.done    .sname { color: var(--dim); }
    .stage.active  .sname { color: var(--text); }
    .stage.pending .sname { color: var(--dim); }

    .stage-tasks { padding: 2px 16px 14px; display: flex; flex-direction: column; gap: 8px; }

    .task { display: flex; align-items: center; gap: 11px; cursor: pointer; padding: 3px 0; }
    .task:hover .tcheck { border-color: #555; }

    .tcheck {
      width: 15px; height: 15px; border-radius: 3px; border: 1px solid var(--border);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .task.done .tcheck { background: var(--green); border-color: var(--green); }
    .task.done .tcheck::after { content: '✓'; font-size: 9px; color: var(--green-light); font-weight: 700; }

    .ttxt { font-size: 13px; line-height: 1.4; }
    .task.done .ttxt { color: var(--dim); text-decoration: line-through; text-decoration-color: #2a2a2a; }

    /* ── MODAL ── */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.82);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .mbox { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 30px; width: 420px; max-width: 90vw; }
    .mtitle { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 22px; }
    .mfield { margin-bottom: 14px; }
    .mlabel { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); display: block; margin-bottom: 6px; }
    .minput {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 9px 13px; font-size: 15px; font-family: var(--font); border-radius: 2px; outline: none; transition: border-color .15s;
    }
    .minput:focus { border-color: var(--yellow); }
    .mbtns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }
  </style>
</head>
<body>
<div style="position:fixed;top:0;left:0;right:0;z-index:9999;height:36px;background:rgba(10,10,10,0.95);border-bottom:1px solid #1e1e1e;display:flex;align-items:center;padding:0 28px"><a href="../hub.html" style="font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#484848;text-decoration:none;font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600" onmouseover="this.style.color='#e0e0e0'" onmouseout="this.style.color='#484848'">← Hub</a></div>

<div class="page-header">
  <div class="page-header-left">
    <div class="page-eyebrow">Left in the Edit</div>
    <h1 class="page-title">Production <span>Pipeline</span></h1>
  </div>
  <div class="launch-block">
    <div class="launch-n" id="launch-n"></div>
    <div class="launch-lbl" id="launch-lbl"></div>
  </div>
</div>

<div id="view-dash"></div>
<div id="view-detail" hidden></div>

<div id="overlay" style="display:none">
  <div class="mbox">
    <div class="mtitle">New Case</div>
    <div class="mfield">
      <label class="mlabel" for="m-num">Case Number</label>
      <input class="minput" id="m-num" placeholder="e.g. 014" autocomplete="off" spellcheck="false">
    </div>
    <div class="mfield">
      <label class="mlabel" for="m-name">Case Name</label>
      <input class="minput" id="m-name" placeholder="e.g. John Doe" autocomplete="off" spellcheck="false">
    </div>
    <div class="mbtns">
      <button class="btn" onclick="hideModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitCase()">Add Case</button>
    </div>
  </div>
</div>

<script>
// ── Pipeline definition ──────────────────────────────────────────────────────
const PIPELINE = [
  { id:'discovery', name:'Discovery', tasks:[] },
  { id:'vetting', name:'Vetting', tasks:[
    { id:'vet-1', text:'Bodycam footage confirmed available' },
    { id:'vet-2', text:'Court records / official sources identified' },
    { id:'vet-3', text:'Case personally interests me' },
    { id:'vet-4', text:'Editorial standards check passed (see editorial-standards.html)' },
    { id:'vet-5', text:'No legal or ethical concerns with coverage angle' },
  ]},
  { id:'research', name:'Research', tasks:[
    { id:'res-1', text:'All footage downloaded' },
    { id:'res-2', text:'Court documents obtained' },
    { id:'res-3', text:'Outcome confirmed and citable' },
    { id:'res-4', text:'Sources logged in vault' },
    { id:'res-5', text:'Claims categorised by source strength (footage, court record, police statement, reporting)' },
    { id:'res-6', text:'Unverified claims removed or clearly attributed' },
  ]},
  { id:'rough-cut', name:'Rough Cut', tasks:[
    { id:'rc-1', text:'Footage converted and imported into Resolve' },
    { id:'rc-2', text:'Key clips identified and trimmed' },
    { id:'rc-3', text:'Assembly cut complete' },
  ]},
  { id:'script', name:'Script', tasks:[
    { id:'scr-1', text:'Script drafted' },
    { id:'scr-2', text:'Facts verified against sources' },
    { id:'scr-3', text:'Script finalized' },
    { id:'scr-4', text:'Attribution language checked (allegedly, police say, court records state, footage appears to show)' },
    { id:'scr-5', text:'No guilt implied beyond what the record supports' },
    { id:'scr-6', text:'Graphic or distressing moments justified or removed' },
  ]},
  { id:'narration', name:'Narration', tasks:[
    { id:'nar-1', text:'Narration recorded in ElevenLabs' },
    { id:'nar-2', text:'Audio processed in Resolve (compressor, EQ, reverb)' },
    { id:'nar-3', text:'Narration synced to timeline' },
  ]},
  { id:'graphics', name:'Graphics', tasks:[
    { id:'gfx-1', text:'Lower thirds placed on timeline' },
    { id:'gfx-2', text:'Nameplates created and placed' },
    { id:'gfx-3', text:'Corner tags added' },
    { id:'gfx-4', text:'Redaction/reveal treatment used only where evidence supports it' },
  ]},
  { id:'captions', name:'Captions', tasks:[
    { id:'cap-1', text:'Captions added to timeline' },
    { id:'cap-2', text:'Captions reviewed for accuracy and timing' },
  ]},
  { id:'review', name:'Review', tasks:[
    { id:'rev-1', text:'Full playback completed' },
    { id:'rev-2', text:'Audio levels balanced' },
    { id:'rev-3', text:'Pacing checked' },
    { id:'rev-4', text:'Any fixes applied and re-checked' },
  ]},
  { id:'thumbnail', name:'Thumbnail', tasks:[
    { id:'thu-1', text:'Concept decided' },
    { id:'thu-2', text:'Thumbnail designed' },
    { id:'thu-3', text:'Legibility tested at small size' },
    { id:'thu-4', text:'Title and thumbnail work as a pair (title creates the question, thumbnail shows the evidence)' },
    { id:'thu-5', text:'One clear evidence hook, no gore/grief/shock as hook' },
  ]},
  { id:'publish', name:'Publish', tasks:[
    { id:'pub-1', text:'Title written' },
    { id:'pub-2', text:'Description written' },
    { id:'pub-3', text:'Tags added' },
    { id:'pub-4', text:'Scheduled or published' },
    { id:'pub-5', text:'Sources/attribution listed in description' },
    { id:'pub-6', text:'Pinned-comment disclosure or correction note prepared if needed' },
  ]},
  { id:'live', name:'Live', tasks:[
    { id:'live-1', text:'Video is live on YouTube' },
  ]},
];

const ALL_TASKS = PIPELINE.flatMap(s => s.tasks);
const LAUNCH    = new Date('2026-06-01');

// ── Default data (Case 001 pre-seeded) ──────────────────────────────────────
function seed() {
  return {
    cases: [{
      id: 1, number: '001', name: 'Angie Frost', added: '2026-01-15',
      tasks: {
        'vet-1':true, 'vet-2':true, 'vet-3':true,
        'res-1':true, 'res-2':true, 'res-3':true, 'res-4':true,
        'rc-1':true,  'rc-2':true,  'rc-3':true,
        'scr-1':true, 'scr-2':true, 'scr-3':true,
        'gfx-1':true, 'gfx-2':true, 'gfx-3':true,
      }
    }],
    nextId: 2
  };
}

let data;
try { data = JSON.parse(localStorage.getItem('lite_pipeline') || 'null') || seed(); }
catch { data = seed(); }
if (!data._v2) {
  data.cases = data.cases.filter(c => c.number === '001');
  data.nextId = 2;
  data._v2 = true;
  data.cases.forEach(c => { if (!c.tasks) c.tasks = {}; });
}
function save() { localStorage.setItem('lite_pipeline', JSON.stringify(data)); }

const expanded  = new Set(); // stage IDs explicitly toggled open
let activeCase  = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function h(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function stageStatus(c, stage) {
  if (!stage.tasks.length) return 'done';
  const done = stage.tasks.filter(t => c.tasks[t.id]).length;
  if (done === stage.tasks.length) return 'done';
  return done > 0 ? 'active' : 'pending';
}

function getProgress(c) {
  const done  = ALL_TASKS.filter(t => c.tasks[t.id]).length;
  const total = ALL_TASKS.length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  let currentStage = PIPELINE[PIPELINE.length - 1];
  let nextTask     = null;
  for (const stage of PIPELINE) {
    const inc = stage.tasks.filter(t => !c.tasks[t.id]);
    if (inc.length) { currentStage = stage; nextTask = inc[0]; break; }
  }
  return { done, total, pct, currentStage, nextTask };
}

function daysToLaunch() {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((LAUNCH - now) / 86400000);
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function showDash() {
  activeCase = null;
  document.getElementById('view-dash').hidden   = false;
  document.getElementById('view-detail').hidden = true;
  renderDash();
}

function renderDash() {
  const days  = daysToLaunch();
  const color = days <= 0 ? '#48c97a' : days <= 7 ? '#e05050' : days <= 17 ? '#FFDD00' : '#888';
  const label = days <= 0 ? 'live now' : days === 1 ? 'day to launch' : 'days to launch';

  const cards = data.cases.map(c => {
    const { pct, currentStage, nextTask } = getProgress(c);
    const tagClass = pct === 100 ? 'done' : pct > 0 ? 'active' : 'pending';
    const tagText  = pct === 100 ? 'Complete' : h(currentStage.name);
    return `
      <div class="card" onclick="showDetail(${c.id})">
        <div class="card-num">Case ${h(c.number)}</div>
        <div class="card-name">${h(c.name)}</div>
        <div class="card-row">
          <span class="tag tag-${tagClass}">${tagText}</span>
          <span class="card-pct">${pct}%</span>
        </div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
        ${nextTask ? `
          <div class="card-next">
            <div class="card-next-lbl">Next</div>
            <div class="card-next-txt">${h(nextTask.text)}</div>
          </div>` : ''}
      </div>`;
  }).join('');

  const launchN = document.getElementById('launch-n');
  launchN.style.color = color;
  launchN.textContent = Math.abs(days);
  document.getElementById('launch-lbl').textContent = label;

  document.getElementById('view-dash').innerHTML = `
    <div class="grid">
      ${cards}
      <button class="add-card" onclick="showModal(event)">+ New Case</button>
    </div>`;
}

// ── Detail ───────────────────────────────────────────────────────────────────
function showDetail(id) {
  activeCase = id;
  document.getElementById('view-dash').hidden   = true;
  document.getElementById('view-detail').hidden = false;
  renderDetail();
}

function renderDetail() {
  const c = data.cases.find(x => x.id === activeCase);
  if (!c) return showDash();
  const { done, total, pct } = getProgress(c);

  const stagesHtml = PIPELINE.map(stage => {
    const status = stageStatus(c, stage);
    const dotClass = status === 'done' ? 'sdot-done' : status === 'active' ? 'sdot-active' : 'sdot-pending';

    // No-task stage (Discovery)
    if (!stage.tasks.length) {
      return `
        <div class="stage done">
          <div class="stage-hdr">
            <div class="sdot ${dotClass}"></div>
            <div class="sname">${h(stage.name)}</div>
            <span class="tag tag-done">Auto</span>
          </div>
        </div>`;
    }

    const tasksDone = stage.tasks.filter(t => c.tasks[t.id]).length;
    const countTag  = status === 'done'
      ? `<span class="tag tag-done">Done</span>`
      : status === 'active'
      ? `<span class="tag tag-active">${tasksDone}&thinsp;/&thinsp;${stage.tasks.length}</span>`
      : `<span class="tag tag-pending">0&thinsp;/&thinsp;${stage.tasks.length}</span>`;

    // All stages collapsed by default; click header to expand
    const isOpen = expanded.has(stage.id);

    const tasksHtml = isOpen ? `
      <div class="stage-tasks">
        ${stage.tasks.map(t => {
          const isDone = !!c.tasks[t.id];
          return `<div class="task ${isDone ? 'done' : ''}" onclick="toggleTask(${c.id},'${t.id}')">
            <div class="tcheck"></div>
            <div class="ttxt">${h(t.text)}</div>
          </div>`;
        }).join('')}
      </div>` : '';

    return `
      <div class="stage has-tasks ${status}">
        <div class="stage-hdr" onclick="toggleExpanded('${stage.id}')">
          <div class="sdot ${dotClass}"></div>
          <div class="sname">${h(stage.name)}</div>
          ${countTag}
        </div>
        ${tasksHtml}
      </div>`;
  }).join('');

  document.getElementById('view-detail').innerHTML = `
    <button class="back" onclick="showDash()">← All Cases</button>
    <div class="det-hdr">
      <div class="det-num">Case ${h(c.number)}</div>
      <div class="det-name">${h(c.name)}</div>
      <div class="det-prog-row">
        <div class="det-pbar"><div class="det-pfill" style="width:${pct}%"></div></div>
        <div class="det-pct">${done}&thinsp;/&thinsp;${total} tasks &middot; ${pct}%</div>
      </div>
    </div>
    <div class="stages">${stagesHtml}</div>
    <div style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border)">
      <button onclick="deleteCase(${c.id})" style="background:none;border:1px solid #2a1a1a;color:#553333;padding:8px 16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:var(--font);font-weight:600;border-radius:2px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='#8b1a1a';this.style.color='#e05050'" onmouseout="this.style.borderColor='#2a1a1a';this.style.color='#553333'">Delete Case</button>
    </div>`;
}

function toggleExpanded(stageId) {
  expanded.has(stageId) ? expanded.delete(stageId) : expanded.add(stageId);
  renderDetail();
}

// ── Actions ──────────────────────────────────────────────────────────────────
function deleteCase(id) {
  const c = data.cases.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`Delete "${c.name}"? This can't be undone.`)) return;
  data.cases = data.cases.filter(x => x.id !== id);
  save();
  showDash();
}

function toggleTask(caseId, taskId) {
  const c = data.cases.find(x => x.id === caseId);
  if (!c) return;
  c.tasks[taskId] = !c.tasks[taskId];
  save();
  renderDetail();
}

function showModal(e) {
  e.stopPropagation();
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('m-num').value = '';
  document.getElementById('m-name').value = '';
  setTimeout(() => document.getElementById('m-num').focus(), 50);
}
function hideModal() { document.getElementById('overlay').style.display = 'none'; }

function submitCase() {
  const num  = document.getElementById('m-num').value.trim();
  const name = document.getElementById('m-name').value.trim();
  if (!num || !name) return;
  data.cases.push({
    id: data.nextId++,
    number: num.padStart(3, '0'),
    name,
    added: new Date().toISOString().slice(0, 10),
    tasks: {}
  });
  save();
  hideModal();
  renderDash();
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target.id === 'overlay') hideModal();
});
document.addEventListener('keydown', e => {
  if (document.getElementById('overlay').style.display === 'none') return;
  if (e.key === 'Enter')  submitCase();
  if (e.key === 'Escape') hideModal();
});

showDash();
