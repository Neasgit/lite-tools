<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 fill=%27%230d0d0d%27/%3E%3Ctext x=%2716%27 y=%2724%27 font-family=%27Helvetica Neue,Arial,sans-serif%27 font-size=%2720%27 font-weight=%27900%27 text-anchor=%27middle%27 fill=%27%23D4A800%27%3EL%3C/text%3E%3C/svg%3E">
<title>Left in the Edit — Banner Export</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    color: #e8e8e0;
    min-height: 100vh;
  }
  .body-pad { padding: 32px 80px 48px; }
  h1.legacy { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  p  { font-size: 13px; color: #555; margin-bottom: 28px; }

  /* Standard page-header (matches other pages) */
  .page-header {
    margin-top: 36px;
    border-bottom: 1px solid #1e1e1e;
    padding: 48px 80px 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .page-header-left { display: flex; flex-direction: column; gap: 8px; }
  .page-eyebrow {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: #888; font-weight: 500;
  }
  .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; color: #fff; }
  .page-title span { color: #D4A800; }
  .page-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .page-meta { font-size: 11px; color: #333; text-align: right; line-height: 1.8; letter-spacing: 1px; }

  .preview-wrap {
    width: 100%;
    max-width: 860px;
    aspect-ratio: 2560 / 1440;
    position: relative;
    margin-bottom: 20px;
    border: 1px solid #1e1e1e;
  }
  .preview-wrap canvas { width: 100%; height: 100%; display: block; }

  /* Safe zone overlay */
  .safe-zone {
    position: absolute;
    left: calc(507 / 2560 * 100%);
    top:  calc(508 / 1440 * 100%);
    width:  calc(1546 / 2560 * 100%);
    height: calc(423  / 1440 * 100%);
    border: 1px dashed rgba(212,168,0,0.3);
    pointer-events: none;
  }
  .safe-zone-label {
    position: absolute;
    top: -18px;
    left: 0;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(212,168,0,0.4);
  }

  .actions { display: flex; gap: 12px; align-items: center; }

  button {
    background: #D4A800;
    color: #000;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 2px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button.secondary {
    background: none;
    border: 1px solid #2a2a2a;
    color: #555;
  }
  button.secondary:hover { border-color: #444; color: #aaa; }

  .note { font-size: 12px; color: #383838; margin-left: 4px; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-left">
    <div class="page-eyebrow">Left in the Edit</div>
    <h1 class="page-title">Channel <span>Banner</span></h1>
    <div class="page-sub">Preview below — Click Download PNG to export at full 2560 × 1440</div>
  </div>
  <div class="page-meta">
    Interactive tool · May 2026<br>
    Output: 2560 × 1440 PNG
  </div>
</div>

<div class="body-pad">

<div class="preview-wrap">
  <canvas id="banner" width="2560" height="1440"></canvas>
  <div class="safe-zone">
    <span class="safe-zone-label">Safe zone — visible on all devices</span>
  </div>
</div>

<div class="actions">
  <button onclick="downloadPNG()">Download PNG (2560×1440)</button>
  <button class="secondary" onclick="toggleSafeZone()">Toggle safe zone guide</button>
  <span class="note">Upload directly to YouTube Studio → Customisation → Branding → Banner image</span>
</div>

<script>
  const canvas = document.getElementById('banner');
  const ctx = canvas.getContext('2d');

  const W = 2560, H = 1440;

  // Colours
  const C_BG     = '#111111';
  const C_AMBER  = '#D4A800';
  const C_WHITE  = '#ffffff';
  const C_MUTED  = '#555555';
  const C_HANDLE = '#888888';

  // Safe zone bounds: x 507–2053, y 508–931
  const SZ_X = 507, SZ_Y = 508, SZ_W = 1546, SZ_H = 423;
  const SZ_CY = SZ_Y + SZ_H / 2; // vertical centre = 719.5

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, W, H);

    // Amber left bar — full height, decorative (outside safe zone but fine on TV)
    ctx.fillStyle = C_AMBER;
    ctx.fillRect(0, 0, 18, H);

    // ── Wordmark ────────────────────────────────────────────────
    // Left-aligned to safe zone left edge + 48px padding
    const wmX    = SZ_X + 48;   // 555
    const wmY    = SZ_CY - 18;  // slightly above centre
    const wmSize = 96;

    ctx.font = `700 ${wmSize}px Arial, sans-serif`;

    ctx.fillStyle = C_WHITE;
    const part1 = 'LEFT IN ';
    ctx.fillText(part1, wmX, wmY);
    const w1 = ctx.measureText(part1).width;

    ctx.fillStyle = C_AMBER;
    ctx.fillText('THE EDIT', wmX + w1, wmY);

    // ── Tagline ──────────────────────────────────────────────────
    ctx.font = `400 30px Arial, sans-serif`;
    ctx.fillStyle = C_MUTED;

    const tagline = 'NOTHING LEFT OUT';
    let tx = wmX + 2;
    for (let i = 0; i < tagline.length; i++) {
      ctx.fillText(tagline[i], tx, wmY + 58);
      tx += ctx.measureText(tagline[i]).width + 4;
    }

    // ── Handle — right-aligned, vertical centre line
    ctx.font = `500 26px Arial, sans-serif`;
    ctx.fillStyle = C_HANDLE;
    const handle = '@leftintheedit';
    const handleW = ctx.measureText(handle).width;
    const handleX = SZ_X + SZ_W - handleW - 8;
    const handleY = SZ_CY + 6;
    ctx.fillText(handle, handleX, handleY);
  }

  function toggleSafeZone() {
    const sz = document.querySelector('.safe-zone');
    sz.style.display = (sz.style.display === 'none') ? 'block' : 'none';
  }

  function downloadPNG() {
    const link = document.createElement('a');
    link.download = 'left-in-the-edit-banner-2560x1440.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  draw();
</script>

</div>

<script src="../sidebar.js"></script>
</body>
</html>
