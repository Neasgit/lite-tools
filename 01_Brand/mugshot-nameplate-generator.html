<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 fill=%27%230d0d0d%27/%3E%3Ctext x=%2716%27 y=%2724%27 font-family=%27Helvetica Neue,Arial,sans-serif%27 font-size=%2720%27 font-weight=%27900%27 text-anchor=%27middle%27 fill=%27%23D4A800%27%3EL%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="only dark">
  <title>Mugshot Nameplate — Left in the Edit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e0;
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 80px 36px;
      gap: 32px;
    }

    .page-header {
      align-self: stretch;
      margin-top: 36px;
      margin-left: -80px;
      margin-right: -80px;
      border-bottom: 1px solid #1e1e1e;
      padding: 48px 80px 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .page-header-left { display: flex; flex-direction: column; gap: 8px; }
    .page-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
      font-weight: 500;
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #fff;
    }
    .page-title span { color: #D4A800; }
    .page-sub {
      font-size: 13px;
      color: #555;
      margin-top: 2px;
    }

    /* ── Controls row ── */
    .controls {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      font-weight: 500;
    }

    input[type="text"] {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      color: #fff;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
      border-radius: 3px;
      outline: none;
      width: 300px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent, #8B1A1A); }

    select {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      color: #fff;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent, #8B1A1A); }

    .btn {
      border: 1px solid #2e2e2e;
      padding: 10px 20px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-flip {
      background: #1c1c1c;
      color: #666;
    }
    .btn-flip:hover { border-color: #555; color: #aaa; }
    .btn-flip.active { background: #1c1c1c; border-color: var(--accent, #8B1A1A); color: #fff; }

    .btn-download {
      background: var(--accent, #8B1A1A);
      color: #fff;
      border-color: transparent;
    }
    .btn-download:hover { filter: brightness(1.15); }
    .btn-download:active { filter: brightness(0.85); }

    /* ── Colour scheme row ── */
    .scheme-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .scheme-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3a3a;
      margin-right: 4px;
      font-weight: 500;
    }

    .swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      color: #555;
      padding: 7px 14px 7px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: inherit;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s;
    }
    .swatch:hover { color: #aaa; border-color: #555; }
    .swatch.active { color: #fff; border-color: var(--dot); }

    .swatch-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dot);
      flex-shrink: 0;
    }

    /* ── Preview canvas ── */
    .preview-wrap {
      width: 960px;
      height: 540px;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #222;
      background-color: #181818;
      background-image:
        linear-gradient(45deg, #222 25%, transparent 25%),
        linear-gradient(-45deg, #222 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #222 75%),
        linear-gradient(-45deg, transparent 75%, #222 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0px;
      position: relative;
    }

    canvas {
      display: block;
      width: 960px;
      height: 540px;
      position: absolute;
      top: 0; left: 0;
    }

    footer {
      font-size: 11px;
      color: #2e2e2e;
      letter-spacing: 1px;
      text-align: center;
      line-height: 2;
    }
    footer span { color: #444; }
  </style>
</head>
<body>
<div style="position:fixed;top:0;left:0;right:0;z-index:9999;height:36px;background:rgba(10,10,10,0.95);border-bottom:1px solid #1e1e1e;display:flex;align-items:center;padding:0 28px"><a href="../hub.html" style="font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#484848;text-decoration:none;font-family:'Inter', 'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600" onmouseover="this.style.color='#e0e0e0'" onmouseout="this.style.color='#484848'">← Hub</a></div>

  <div class="page-header">
    <div class="page-header-left">
      <div class="page-eyebrow">Left in the Edit</div>
      <h1 class="page-title">Mugshot Nameplate <span>Generator</span></h1>
      <div class="page-sub">1920 × 1080 transparent PNG export</div>
    </div>
    <div class="page-meta">
      Interactive tool · May 2026<br>
      Output: transparent PNG for Resolve V2
    </div>
  </div>

  <div class="controls">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="inp-name" placeholder="JOHN DOE" value="ANGIE FROST" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Label</label>
      <select id="inp-label">
        <option value="SUSPECT">SUSPECT</option>
        <option value="DEFENDANT">DEFENDANT</option>
        <option value="VICTIM">VICTIM</option>
        <option value="WITNESS">WITNESS</option>
        <option value="OFFICER">OFFICER</option>
        <option value="DETECTIVE">DETECTIVE</option>
        <option value="CONVICTED">CONVICTED</option>
        <option value="ACQUITTED">ACQUITTED</option>
        <option value="INFORMANT">INFORMANT</option>
        <option value="DECEASED">DECEASED</option>
      </select>
    </div>
    <div class="field">
      <label>Layout</label>
      <button class="btn btn-flip" id="btn-flip" onclick="toggleFlip()">&#8597; Flip</button>
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="btn btn-download" onclick="download()">&#8595; Download PNG</button>
    </div>
  </div>

  <!-- Colour schemes -->
  <div class="scheme-row">
    <span class="scheme-label">Colour</span>

    <button class="swatch active" style="--dot:#8B1A1A" data-scheme="crime" onclick="setScheme(this)">
      <span class="swatch-dot"></span>Crime
    </button>
    <button class="swatch" style="--dot:#FFDD00" data-scheme="channel" onclick="setScheme(this)">
      <span class="swatch-dot"></span>Channel
    </button>
    <button class="swatch" style="--dot:#1B5FA8" data-scheme="ice" onclick="setScheme(this)">
      <span class="swatch-dot"></span>Ice
    </button>
    <button class="swatch" style="--dot:#2E7D4F" data-scheme="forest" onclick="setScheme(this)">
      <span class="swatch-dot"></span>Forest
    </button>
    <button class="swatch" style="--dot:#666666" data-scheme="ghost" onclick="setScheme(this)">
      <span class="swatch-dot"></span>Ghost
    </button>
  </div>

  <div class="preview-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
  </div>

  <footer>
    Checkerboard = transparency &nbsp;&bull;&nbsp; Drop directly onto V2 in DaVinci Resolve<br>
    File: <span id="filename-preview">angie-frost-suspect.png</span>
  </footer>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    // ── Colour schemes ──────────────────────────────────────────────
    const SCHEMES = {
      crime:   { bar: '#8B1A1A', label: '#A52020', bg: 'rgba(6,6,6,0.91)' },
      channel: { bar: '#FFDD00', label: '#FFDD00', bg: 'rgba(6,6,6,0.91)' },
      ice:     { bar: '#1B5FA8', label: '#2B7FD4', bg: 'rgba(6,6,6,0.91)' },
      forest:  { bar: '#2E7D4F', label: '#3BA063', bg: 'rgba(6,6,6,0.91)' },
      ghost:   { bar: '#555555', label: '#888888', bg: 'rgba(6,6,6,0.91)' },
    };

    let activeScheme = 'crime';
    let isFlipped    = false;

    // Propagate accent colour to CSS for focus rings
    function syncAccent() {
      document.documentElement.style.setProperty('--accent', SCHEMES[activeScheme].bar);
    }

    function setScheme(btn) {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      activeScheme = btn.dataset.scheme;
      syncAccent();
      render();
    }

    function toggleFlip() {
      isFlipped = !isFlipped;
      document.getElementById('btn-flip').classList.toggle('active', isFlipped);
      render();
    }

    // ── Render ──────────────────────────────────────────────────────
    const FONT        = '"Inter", "Helvetica Neue", Helvetica, Arial, sans-serif';
    const LABEL_SIZE  = 28;
    const NAME_SIZE   = 84;
    const WHITE       = '#FFFFFF';

    function render() {
      const name   = (document.getElementById('inp-name').value || 'NAME').trim().toUpperCase();
      const label  = document.getElementById('inp-label').value;
      const scheme = SCHEMES[activeScheme];

      // Filename preview
      const safe = name.toLowerCase().replace(/\s+/g, '-');
      document.getElementById('filename-preview').textContent =
        `${safe}-${label.toLowerCase()}.png`;

      ctx.clearRect(0, 0, 1920, 1080);
      ctx.textBaseline = 'top';

      // ── Measure ──
      const labelSpaced = label.split('').join('  ');

      ctx.font = `500 ${LABEL_SIZE}px ${FONT}`;
      const labelW = ctx.measureText(labelSpaced).width;
      const labelH = Math.ceil(LABEL_SIZE * 1.25);

      ctx.font = `700 ${NAME_SIZE}px ${FONT}`;
      const nameW = ctx.measureText(name).width;
      const nameH = Math.ceil(NAME_SIZE * 1.10);

      const contentW = Math.max(labelW, nameW);

      // ── Layout ──
      const edgeL   = 80;
      const edgeB   = 72;
      const barW    = 7;
      const gapBar  = 30;
      const padV    = 28;
      const padH    = 40;
      const lineGap = 14;
      const lineH   = 1;

      const textX  = edgeL + barW + gapBar;
      const blockH = padV + labelH + lineGap + lineH + lineGap + nameH + padV;
      const blockW = barW + gapBar + contentW + padH;
      const blockX = edgeL;
      const blockY = 1080 - edgeB - blockH;

      // ── Draw background ──
      ctx.fillStyle = scheme.bg;
      ctx.fillRect(blockX, blockY, blockW, blockH);

      // ── Draw accent bar ──
      ctx.fillStyle = scheme.bar;
      ctx.fillRect(blockX, blockY, barW, blockH);

      // ── Draw content (flippable) ──
      const topY = blockY + padV;

      if (!isFlipped) {
        // Label → divider → Name
        drawLabel(textX, topY, labelSpaced, labelH, scheme, contentW, lineGap, lineH);
        drawName(textX, topY + labelH + lineGap + lineH + lineGap, name, scheme);
      } else {
        // Name → divider → Label
        drawName(textX, topY, name, scheme);
        const divY = topY + nameH + lineGap;
        drawDivider(textX, divY, contentW, lineH);
        drawLabel(textX, divY + lineH + lineGap, labelSpaced, labelH, scheme, null, null, null);
      }
    }

    function drawLabel(x, y, text, h, scheme, contentW, lineGap, lineH) {
      ctx.font = `500 ${LABEL_SIZE}px ${FONT}`;
      ctx.fillStyle = scheme.label;
      ctx.fillText(text, x, y);
      if (contentW !== null) {
        const divY = y + h + lineGap;
        drawDivider(x, divY, contentW, lineH);
      }
    }

    function drawName(x, y, text, scheme) {
      ctx.font = `700 ${NAME_SIZE}px ${FONT}`;
      ctx.fillStyle = WHITE;
      ctx.fillText(text, x, y);
    }

    function drawDivider(x, y, w, h) {
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.fillRect(x, y, w, h);
    }

    // ── Download ────────────────────────────────────────────────────
    function download() {
      render();
      const name  = (document.getElementById('inp-name').value || 'name').trim();
      const label = document.getElementById('inp-label').value.toLowerCase();
      const safe  = name.toLowerCase().replace(/\s+/g, '-');
      const link  = document.createElement('a');
      link.download = `${safe}-${label}.png`;
      link.href     = canvas.toDataURL('image/png');
      link.click();
    }

    // ── Init ────────────────────────────────────────────────────────
    document.getElementById('inp-name').addEventListener('input', render);
    document.getElementById('inp-label').addEventListener('change', render);

    syncAccent();
    render();
  </script>

<script src="../sidebar.js"></script>
</body>
</html>
