    :root {
      --amber: #D4A800;
      --amber-soft: #e8c145;
      --crimson: #C8102E;

      --bg: #0c0c0c;
      --bg-elev: #141414;
      --bg-elev-2: #1c1c1c;
      --border: #262626;
      --border-strong: #333;

      --text: #f0efe7;
      --text-dim: #9b9a92;
      --text-dimmer: #67665f;

      --thumb-bg: #141414;
      --redact-bg: #060606;

      --sidebar-w: 260px;
      --sidebar-density: 1;
      --shell-pad: 64px;

      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    [data-theme="light"] {
      --bg: #f5f4ee;
      --bg-elev: #ecebe3;
      --bg-elev-2: #e3e1d6;
      --border: #d6d3c4;
      --border-strong: #c2bfaf;
      --text: #1a1a17;
      --text-dim: #5b5851;
      --text-dimmer: #8a877e;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.55;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    .v2-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono);
      font-size: 10px; letter-spacing: 2px;
      padding: 3px 8px; border-radius: 2px;
      background: var(--amber); color: #111; font-weight: 600;
    }

    .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

    .sidebar {
      position: sticky; top: 0; height: 100vh;
      border-right: 1px solid var(--border);
      background: var(--bg);
      padding: 24px 18px 20px;
      display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto; z-index: 30;
    }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    .sb-brand {
      display: flex; align-items: baseline; gap: 8px;
      letter-spacing: 4px; font-weight: 700; font-size: 16px;
      padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .sb-brand .li { color: var(--text); }
    .sb-brand .te { color: var(--amber); }
    .sb-brand .ver { margin-left: auto; font-size: 10px; letter-spacing: 1.5px; color: var(--text-dimmer); font-weight: 500; font-family: var(--mono); }

    .sb-group { display: flex; flex-direction: column; gap: 2px; }
    .sb-group-label {
      font-family: var(--mono); font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: #888780; font-weight: 600; margin-bottom: 4px; padding-left: 8px;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; padding-right: 4px;
    }
    .sb-group-label::after {
      content: "â€º";
      margin-left: auto;
      font-size: 13px; font-weight: 400; letter-spacing: 0;
      color: var(--text-dimmer);
      transform: rotate(90deg);
      display: inline-block;
      transition: transform .2s;
      line-height: 1;
    }
    .sb-group.collapsed .sb-group-label::after { transform: rotate(0deg); }
    .sb-items-wrap {
      overflow: hidden;
      max-height: 600px;
      transition: max-height .25s ease;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sb-group.collapsed .sb-items-wrap { max-height: 0; }

    .sb-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); backdrop-filter: blur(2px); z-index: 29;
    }
    .sb-overlay.show { display: block; }
    .sb-item {
      display: flex; align-items: center; gap: 8px;
      padding: calc(7px * var(--sidebar-density)) 8px;
      border-radius: 4px; font-size: 13px; color: var(--text-dim);
      border: 1px solid transparent; transition: color .15s, background .15s, border-color .15s;
      cursor: pointer;
    }
    .sb-item:hover { color: var(--text); background: var(--bg-elev); }
    .sb-item.active { color: var(--text); background: var(--bg-elev); border-color: var(--border-strong); }
    .sb-item.active::before {
      content: ""; width: 3px; height: 13px; background: var(--amber);
      border-radius: 1px; margin-right: 4px; margin-left: -4px;
    }
    .sb-item .num { color: var(--text-dimmer); font-variant-numeric: tabular-nums; font-size: 10px; font-weight: 500; min-width: 16px; font-family: var(--mono); }
    .sb-item.active .num { color: var(--amber); }
    .sb-item .new-flag {
      margin-left: auto; font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
      background: var(--amber); color: #111; padding: 1px 4px; border-radius: 2px; font-weight: 600;
    }

    .sb-foot {
      margin-top: auto; display: flex; align-items: center; gap: 10px;
      padding-top: 18px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-dimmer); letter-spacing: 1px;
    }
    .sb-foot .hub { display: inline-flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); cursor: pointer; }
    .sb-foot .hub:hover { color: var(--text); }
    .theme-toggle {
      margin-left: auto; display: inline-flex; align-items: center;
      background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; padding: 2px;
    }
    .theme-toggle button {
      background: transparent; border: 0; color: var(--text-dim);
      padding: 4px 10px; border-radius: 999px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
    }
    .theme-toggle button.on { background: var(--text); color: var(--bg); }

    .main { padding: 0 var(--shell-pad) 120px; max-width: 1260px; }

    .hero { padding: 80px 0 56px; border-bottom: 1px solid var(--border); }
    .hero .eyebrow {
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--amber); font-weight: 600;
      display: inline-flex; align-items: center; gap: 14px;
    }
    .hero .eyebrow::before { content: ""; width: 48px; height: 3px; background: var(--amber); }
    .hero h1 {
      font-size: clamp(40px, 6vw, 72px); line-height: .95;
      letter-spacing: -2px; font-weight: 700; margin: 18px 0 12px;
    }
    .hero h1 .te { color: var(--amber); }
    .hero .lede { font-size: 18px; color: var(--text-dim); max-width: 640px; margin: 0 0 36px; line-height: 1.6; }
    .hero .hero-foot {
      display: inline-flex; align-items: center; gap: 18px;
      padding: 14px 18px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--bg-elev);
    }
    .hero .hero-foot .v2-pill { margin: 0; }
    .hero .changelog-link {
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
      color: var(--amber); text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .15s;
    }
    .hero .changelog-link:hover { border-bottom-color: var(--amber); }

    .section { padding: 80px 0 24px; border-bottom: 1px solid var(--border); }
    .section:last-of-type { border-bottom: 0; }
    .section.new { position: relative; }
    .section.new::before {
      content: "NEW IN v2"; position: absolute; top: 60px; right: 0;
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
      background: var(--amber); color: #111;
      padding: 3px 8px; border-radius: 2px; font-weight: 600;
    }
    .section-head { display: flex; gap: 28px; margin-bottom: 36px; align-items: baseline; flex-wrap: wrap; }
    .section-num {
      font-size: 13px; letter-spacing: 3px; color: var(--amber); font-weight: 600;
      font-variant-numeric: tabular-nums; padding-top: 6px; min-width: 36px; font-family: var(--mono);
    }
    .section-title { flex: 1; min-width: 240px; }
    .section-title h2 { font-size: 36px; letter-spacing: -.8px; line-height: 1.05; margin: 0 0 8px; font-weight: 700; }
    .section-title p { color: var(--text-dim); margin: 0; font-size: 14px; max-width: 540px; }

    .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; padding: 22px; }
    .label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--amber); font-weight: 600; font-family: var(--mono); }
    .label.dim { color: var(--text-dimmer); }
    .mono { font-family: var(--mono); }

    .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .swatch {
      border-radius: 6px; border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; transition: transform .2s, border-color .2s;
      position: relative; display: flex; flex-direction: column;
    }
    .swatch:hover { transform: translateY(-2px); border-color: var(--border-strong); }
    .swatch-chip { aspect-ratio: 1.5/1; position: relative; flex: none; }
    .swatch-chip .corner {
      position: absolute; top: 10px; left: 10px;
      font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; font-weight: 600;
      padding: 3px 7px; border-radius: 2px;
      background: rgba(0,0,0,.4); color: #fff;
    }
    .swatch-meta { padding: 14px; background: var(--bg-elev-2); border-top: 1px solid var(--border); flex: 1; display: flex; flex-direction: column; }
    .swatch-meta .name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .swatch-meta .hex { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
    .swatch-meta .desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 8px; flex: 1; }
    .swatch-meta .contrast { font-family: var(--mono); font-size: 10px; color: var(--text-dimmer); margin-top: 8px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
    .swatch .copied {
      position: absolute; inset: 0; background: rgba(20,20,20,.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--amber);
      opacity: 0; pointer-events: none; transition: opacity .2s; font-family: var(--mono);
    }
    .swatch.copied-on .copied { opacity: 1; }
    .swatch-meta .delta {
      margin-top: 8px; font-family: var(--mono); font-size: 10px;
      letter-spacing: 1px; color: var(--amber);
      display: inline-block; padding: 2px 6px; border: 1px solid var(--amber); border-radius: 2px;
    }

    .never-use { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 28px; }
    .never-use .card { display: flex; gap: 14px; align-items: flex-start; padding: 14px; }
    .never-use .chip { width: 36px; height: 36px; border-radius: 4px; flex-shrink: 0; border: 1px solid var(--border); }
    .never-use .text { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
    .never-use .text b { color: var(--text); display: block; font-size: 12px; margin-bottom: 4px; font-family: var(--mono); letter-spacing: .5px; }

    .accent-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .accent-demo {
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 6px; padding: 32px; min-height: 200px;
      display: flex; flex-direction: column; justify-content: flex-end;
      position: relative; overflow: hidden;
    }
    .accent-demo .label { margin-bottom: auto; }
    .accent-demo h4 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; margin: 0; }
    .accent-demo p { font-size: 12px; color: var(--text-dim); margin: 8px 0 0; }
    .bar-h { width: 48px; height: 3px; background: var(--amber); margin-bottom: 10px; }
    .bar-v { width: 3px; height: 22px; background: var(--amber); margin-right: 12px; display: inline-block; vertical-align: middle; }
    .bar-b { position: absolute; left: 32px; right: 32px; bottom: 0; height: 3px; background: var(--amber); }
    .hl-text { background: var(--amber); color: #111; padding: 2px 6px; }

    .tstamp-frame {
      aspect-ratio: 21/9; max-height: 360px; background: var(--thumb-bg);
      border-radius: 4px; border: 1px solid var(--border);
      overflow: hidden; position: relative;
      display: flex; flex-direction: column; justify-content: center; padding: 28px 34px;
      color: #fff;
    }
    .tstamp-frame .footage-grain {
      position: absolute; inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,.4) 100%),
        repeating-linear-gradient(45deg, #1a1916 0 12px, #1f1d18 12px 24px);
      filter: saturate(0.6);
    }
    .tstamp-frame > *:not(.footage-grain) { position: relative; z-index: 2; }
    .tstamp-frame .amber-bar { width: 48px; height: 3px; background: var(--amber); margin-bottom: 14px; }
    .tstamp-frame .title { font-size: clamp(20px, 3.2vw, 36px); font-weight: 700; letter-spacing: -0.5px; line-height: 1.05; max-width: 78%; }
    .tstamp-frame .wm { position: absolute; bottom: 16px; left: 28px; font-family: var(--mono); font-size: 11px; letter-spacing: 4px; font-weight: 700; }
    .tstamp-frame .wm .li { color: #fff; }
    .tstamp-frame .wm .te { color: var(--amber); }

    .timestamp-glyph {
      position: absolute; top: 18px; right: 18px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      background: rgba(0,0,0,.6);
      border: 1px solid rgba(255,255,255,.12);
      font-family: var(--mono);
      font-size: 12px; letter-spacing: 1.5px;
      color: #fff;
      border-radius: 2px;
    }
    .timestamp-glyph .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--amber); flex-shrink: 0;
      box-shadow: 0 0 6px var(--amber);
      animation: pulse 2s ease-in-out infinite;
    }
    .timestamp-glyph .label { font-size: 9px; color: var(--amber); letter-spacing: 2px; opacity: .9; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    .recog-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .recog-card { display: flex; flex-direction: column; gap: 14px; }
    .recog-card .name { font-size: 18px; font-weight: 700; margin: 0; }
    .recog-card .desc { font-size: 13px; color: var(--text-dim); margin: 0; line-height: 1.6; }
    .recog-card .role { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--amber); text-transform: uppercase; font-weight: 600; }

    .redact-stage {
      aspect-ratio: 16/9;
      background:
        linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,.55) 100%),
        repeating-linear-gradient(45deg, #1a1916 0 12px, #1f1d18 12px 24px);
      border-radius: 4px; border: 1px solid var(--border);
      position: relative; overflow: hidden;
      filter: saturate(0.7);
      display: flex; align-items: center; justify-content: center;
      padding: 0 8%;
      cursor: pointer;
    }
    .redact-stage .doc-line {
      font-family: var(--mono); font-size: 16px; line-height: 1.9;
      color: rgba(255,255,255,.85); max-width: 100%;
      position: relative; z-index: 2;
      text-align: left;
      letter-spacing: .5px;
    }
    .redact-stage .doc-line .redact {
      position: relative; display: inline-block;
      color: transparent;
      background: var(--redact-bg);
      padding: 0 6px; margin: 0 2px;
      border-radius: 1px;
      transition: background .3s, color .3s;
    }
    .redact-stage .doc-line .redact::before {
      content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0 2px, transparent 2px 4px);
      pointer-events: none;
    }
    .redact-stage.revealed .doc-line .redact {
      color: var(--amber);
      background: transparent;
      text-shadow: 0 0 8px rgba(232, 155, 15, 0.4);
    }
    .redact-stage .hint {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
      color: var(--text-dimmer); text-transform: uppercase;
      z-index: 3;
    }
    .redact-stage.revealed .hint { color: var(--amber); }
    .redact-spec { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 18px; }
    .redact-spec .cell { padding: 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-elev); }
    .redact-spec .cell .k { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--text-dimmer); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
    .redact-spec .cell .v { font-family: var(--mono); font-size: 13px; color: var(--text); }

    .type-row { display: grid; grid-template-columns: 220px 1fr; gap: 32px; padding: 28px 0; border-top: 1px solid var(--border); }
    .type-row:first-child { border-top: 0; padding-top: 0; }
    .type-row .meta .label { display: block; margin-bottom: 6px; }
    .type-row .meta .spec { font-size: 11px; color: var(--text-dim); font-family: var(--mono); line-height: 1.7; }
    .type-row .meta .desc { font-size: 12px; color: var(--text-dim); margin-top: 10px; }
    .type-row .sample.hero-sample { font-size: 88px; font-weight: 700; letter-spacing: -2px; line-height: .95; }
    .type-row .sample.thumb-sample { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.05; }
    .type-row .sample.section-sample { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .type-row .sample.eyebrow-sample { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--amber); font-weight: 600; }
    .type-row .sample.body-sample { font-size: 16px; line-height: 1.7; color: var(--text); max-width: 540px; }
    .type-row .sample.mono-sample { font-family: var(--mono); font-size: 14px; letter-spacing: 1.5px; color: var(--amber); }
    .font-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
    .font-card { padding: 22px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-elev); }
    .font-card .big { font-size: 32px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 10px; }
    .font-card.dont { background: transparent; border-style: dashed; opacity: .7; }
    .font-card.dont .big { text-decoration: line-through; text-decoration-color: var(--crimson); text-decoration-thickness: 1px; }
    .font-card .tag { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dimmer); font-weight: 600; margin-bottom: 4px; }
    .font-card .desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

    .lite-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 16px; }
    .lite-mark {
      font-weight: 700; letter-spacing: 4px;
      height: 240px; display: flex; align-items: center; justify-content: center;
      font-size: 64px; border-radius: 6px;
      position: relative;
    }
    .lite-mark.dark { background: #111; }
    .lite-mark.dark .li { color: #fff; }
    .lite-mark.dark .te { color: var(--amber); }
    .lite-mark.amber { background: var(--amber); color: #111; }
    .lite-mark.outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .lite-mark .ctx { position: absolute; bottom: 14px; left: 18px; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; font-weight: 500; opacity: .5; text-transform: uppercase; }
    .wordmark-demoted {
      margin-top: 24px;
      padding: 22px;
      border: 1px dashed var(--border-strong);
      border-radius: 6px;
      background: transparent;
      display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
    }
    .wordmark-demoted .mark { font-weight: 700; letter-spacing: 3px; font-size: 22px; }
    .wordmark-demoted .mark .te { color: var(--amber); }
    .wordmark-demoted .note { flex: 1; min-width: 240px; font-size: 12px; color: var(--text-dim); line-height: 1.6; }
    .wordmark-demoted .note b { color: var(--text); display: block; margin-bottom: 4px; font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }

  <script type="text/babel" data-presets="react">

    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });

      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode') setOpen(true);
          else if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => setOpen(false);

      const onDragStart = (e) => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = (ev) => {
          offsetRef.current = {
            x: Math.max(16, startRight - (ev.clientX - sx)),
            y: Math.max(16, startBottom - (ev.clientY - sy)),
          };
          panel.style.right = offsetRef.current.x + 'px';
          panel.style.bottom = offsetRef.current.y + 'px';
        };
        const up = () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) return null;
      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel"
               style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>
              <button className="twk-x" aria-label="Close tweaks"
                      onMouseDown={(e) => e.stopPropagation()}
                      onClick={dismiss}>âœ•</button>
            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      );
    }

    function TweakSection({ label, children }) {
      return (<><div className="twk-sect">{label}</div>{children}</>);
    }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl">
            <span>{label}</span>
            {value != null && <span className="twk-val">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = React.useRef(null);
      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;
      const segAt = (clientX) => {
        const r = trackRef.current.getBoundingClientRect();
        const inner = r.width - 4;
        const i = Math.floor(((clientX - r.left - 2) / inner) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };
      const onPointerDown = (e) => {
        onChange(segAt(e.clientX));
      };
      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className="twk-seg">
            <div className="twk-seg-thumb"
                 style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                          width: `calc((100% - 4px) / ${n})` }} />
            {opts.map((o) => (
              <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
                {o.label}
              </button>
            ))}
          </div>
        </TweakRow>
      );
    }

    Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakRadio });
  </script>

              <div className="head" style={{ color: "var(--crimson)" }}>âœ— DON'T</div>
              <ul>
                <li style={{ color: "var(--text-dim)" }}>Bed music under the whole video â€” that's reaction-channel grammar</li>
                <li style={{ color: "var(--text-dim)" }}>Auto-de-noise bodycam audio â€” keep the texture</li>
                <li style={{ color: "var(--text-dim)" }}>Cut faster than 1 cut every 6 frames</li>
                <li style={{ color: "var(--text-dim)" }}>Use stock cinematic "true crime" drone pads</li>
              </ul>
            </div>
          </div>
        </section>
      );
    }

    function FootageGradeLab() {
      const [sat, setSat] = React.useState(-32);
      const [temp, setTemp] = React.useState(-175);
      const [lift, setLift] = React.useState(3);
      const [gain, setGain] = React.useState(-7);
      const filter = `saturate(${1 + sat / 100}) hue-rotate(${temp / 100 * 4}deg) brightness(${1 + lift / 100}) contrast(${1 - gain / 100})`;

      return (
        <div className="grade-lab">
          <div className="grade-stage">
            <div className="raw" style={{ clipPath: "polygon(0 0, 50% 0, 50% 100%, 0 100%)" }}></div>
            <div className="graded" style={{ clipPath: "polygon(50% 0, 100% 0, 100% 100%, 50% 100%)", filter }}></div>
            <div className="grade-divider"></div>
            <div className="badge raw-b">RAW</div>
            <div className="badge graded-b">GRADED</div>
            <div className="label-mid">BODYCAM STILL Â· INTERIOR Â· 04:12</div>
          </div>
          <div>
            <div className="slider-row">
              <div className="head"><span className="name">Saturation</span><span className="val">{sat > 0 ? "+" : ""}{sat}%</span></div>
              <input type="range" min="-60" max="20" value={sat} onChange={(e) => setSat(+e.target.value)} />
              <div className="hint">Target: âˆ’25 to âˆ’40%. Partial desaturation, not B&W.</div>
            </div>
            <div className="slider-row">
              <div className="head"><span className="name">Colour Temp</span><span className="val">{temp}K</span></div>
              <input type="range" min="-400" max="200" value={temp} onChange={(e) => setTemp(+e.target.value)} />
              <div className="hint">Target: âˆ’150 to âˆ’200K. Counteracts warm bodycam white-balance.</div>
            </div>
            <div className="slider-row">
              <div className="head"><span className="name">Lift</span><span className="val">+{(lift / 100).toFixed(2)}</span></div>
              <input type="range" min="0" max="10" value={lift} onChange={(e) => setLift(+e.target.value)} />
              <div className="hint">Target: +0.02 to +0.04. Lifts shadows so body armour doesn't crush.</div>
            </div>
            <div className="slider-row">
              <div className="head"><span className="name">Gain</span><span className="val">{(gain / 100).toFixed(2)}</span></div>
              <input type="range" min="-20" max="0" value={gain} onChange={(e) => setGain(+e.target.value)} />
              <div className="hint">Target: âˆ’0.05 to âˆ’0.10. Rolls off blown highlights.</div>
            </div>
          </div>
        </div>
      );
    }

    function SectionFootage() {
      return (
        <section className="section" id="footage">
          <SectionHead num="15" title="Footage Treatment" desc="Clinical grade, same node stack across every clip. Unchanged from v1." />
          <p style={{ color: "var(--text-dim)", fontSize: 14, maxWidth: 760, margin: "0 0 28px", lineHeight: 1.6 }}>
            The grade is the floor that makes raw bodycam variations look like one channel. Slightly desaturated, slightly cool, shadows lifted, highlights rolled off. The edit lives in Premiere Pro â€” but grade in DaVinci Resolve and save as a power grade. Do not hand-grade clips one by one.
          </p>
          <FootageGradeLab />

          <div className="section-foot-do-dont" style={{ marginTop: 32 }}>
            <div className="card do">
              <div className="head" style={{ color: "var(--amber)" }}>âœ“ DO</div>
              <ul>
                <li style={{ color: "var(--text-dim)" }}>Save the node stack as a Resolve power grade</li>
                <li style={{ color: "var(--text-dim)" }}>Grade thumbnails to match â€” feed = video</li>
                <li style={{ color: "var(--text-dim)" }}>Lift shadows on night footage to keep body armour visible</li>
              </ul>
            </div>
            <div className="card dont">
              <div className="head" style={{ color: "var(--crimson)" }}>âœ— DON'T</div>
              <ul>
                <li style={{ color: "var(--text-dim)" }}>Orange-teal â€” the most overused look on the internet</li>
                <li style={{ color: "var(--text-dim)" }}>Heavy vignette â€” turns documentary into music video</li>
                <li style={{ color: "var(--text-dim)" }}>Full B&W â€” removes the realism that makes bodycam impactful</li>
              </ul>
            </div>
          </div>
        </section>
      );
    }

    function useScrollSpy(ids) {
      const [active, setActive] = React.useState(ids[0]);
      React.useEffect(() => {
        const handler = () => {
          let cur = ids[0];
          for (const id of ids) {
            const el = document.getElementById(id);
            if (!el) continue;
            const top = el.getBoundingClientRect().top;
            if (top - 140 <= 0) cur = id;
          }
          setActive(cur);
        };
        handler();
        window.addEventListener("scroll", handler, { passive: true });
        return () => window.removeEventListener("scroll", handler);
      }, [ids.join(",")]);
      return active;
    }

    const SECTION_COMPS_V2 = [
      SectionPalette, SectionPrimaryRecog, SectionSecondaryRecog, SectionRedaction,
      SectionType, SectionMark, SectionTagline, SectionVoice,
      SectionAnatomy, SectionVariants, SectionLowerThirds,
      SectionCaptions, SectionHierarchy, SectionMotion, SectionFootage,
    ];

    function SidebarV2({ active, onJump, open, setOpen }) {
      const [collapsed, setCollapsed] = React.useState({});
      const toggle = (key) => setCollapsed((c) => ({ ...c, [key]: !c[key] }));

      return (
        <>
          {open && <div className="sb-overlay show" onClick={() => setOpen(false)} />}
          <aside className={"sidebar " + (open ? "open" : "")}>
            <a className="sb-brand" href="site/index.html" style={{ textDecoration: "none" }}>
              <span className="li">LI</span><span className="te">TE</span>
              <span className="ver">brandÂ·v2</span>
            </a>

            <div style={{ display: "flex", flexDirection: "column", gap: "16px", flex: 1 }}>
              {NAV_V2.map((grp) => (
                <div key={grp.group} className={"sb-group" + (collapsed[grp.group] ? " collapsed" : "")}>
                  <div className="sb-group-label" onClick={() => toggle(grp.group)}>{grp.group}</div>
                  <div className="sb-items-wrap">
                    {grp.items.map((it, idx) => {
                      const isActive = it.active;
                      const inner = (
                        <>
                          <span className="num">{String(idx + 1).padStart(2, "0")}</span>
                          <span>{it.label}</span>
                          {it.version && <span className="new-flag">{it.version}</span>}
                        </>
                      );
                      if (isActive) {
                        return (
                          <div
                            key={it.id}
                            className="sb-item active"
                            onClick={() => {
                              window.scrollTo({ top: 0, behavior: "smooth" });
                              setOpen(false);
                            }}
                            title="Brand Reference (current)"
                          >
                            {inner}
                          </div>
                        );
                      }
                      return (
                        <a key={it.id} className="sb-item" href={it.href || "#"} title={it.label}>
                          {inner}
                        </a>
                      );
                    })}
                  </div>
                </div>
              ))}

              <div className="sb-group" style={{ marginTop: 4, paddingTop: 16, borderTop: "1px solid var(--border)" }}>
                <div className="sb-group-label" style={{ color: "var(--amber)", cursor: "default" }}>On this page</div>
                <div className="sb-items-wrap">
                  {SECTIONS_V2.map((s) => (
                    <div
                      key={s.id}
                      className={"sb-item " + (active === s.id ? "active" : "")}
                      onClick={() => onJump(s.id)}
                    >
                      <span className="num">{s.num}</span>
                      <span style={{ fontSize: 12 }}>{s.title.split(" â€” ")[0].split(" Â· ")[0]}</span>
                      {s.isNew && <span className="new-flag">NEW</span>}
                    </div>
                  ))}
                </div>
              </div>
            </div>

          <div className="sb-foot">
            <a className="hub" href="site/index.html">â† HUB</a>
          </div>
          </aside>
        </>
      );
    }

    function App() {
      const [sidebarOpen, setSidebarOpen] = React.useState(false);
      const active = useScrollSpy(SECTIONS_V2.map((s) => s.id));

      const onJump = (id) => {
        const el = document.getElementById(id);
        if (el) {
          window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 20, behavior: "smooth" });
          setSidebarOpen(false);
        }
      };

      return (
        <>
          <button className="menu-btn" onClick={() => setSidebarOpen(true)}>Menu</button>

          <div className="app">
            <SidebarV2 active={active} onJump={onJump} open={sidebarOpen} setOpen={setSidebarOpen} />
            <main className="main">
              <Hero />
              {SECTION_COMPS_V2.map((C, i) => <C key={i} />)}
              <footer style={{ paddingTop: 64, color: "var(--text-dimmer)", fontSize: 11, letterSpacing: 2, textTransform: "uppercase" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                  <span>Left in the Edit Â· Brand Reference Â· v2</span>
                  <span>Every cut, on the record<span style={{ color: "var(--amber)" }}>.</span></span>
                </div>
              </footer>
            </main>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

</body>
